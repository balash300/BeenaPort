name: Deploy to Fly.io

on:
  push:
    branches:
      - main

jobs:
  deploy-auth:
    name: Deploy Auth Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy Auth Service
        working-directory: ./auth-service
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN_AUTH: ${{ secrets.FLY_API_TOKEN_AUTH }}

  deploy-property:
    name: Deploy Property Service
    runs-on: ubuntu-latest
    needs: deploy-auth
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy Property Service
        working-directory: ./property-service
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN_PROPERTY: ${{ secrets.FLY_API_TOKEN_PROPERTY }}

  deploy-billing:
    name: Deploy Billing Service
    runs-on: ubuntu-latest
    needs: deploy-property
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy Billing Service
        working-directory: ./billing-service
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN_BILLING: ${{ secrets.FLY_API_TOKEN_BILLING }}

  deploy-payment:
    name: Deploy Payment Service
    runs-on: ubuntu-latest
    needs: deploy-billing
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy Payment Service
        working-directory: ./payment-service
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN_PAYMENT: ${{ secrets.FLY_API_TOKEN_PAYMENT }}