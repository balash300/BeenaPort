<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeenaPort — Qeydiyyat</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f0ede8; --card: #ffffff; --purple: #6c5ce7; --orange: #ff7043;
            --yellow: #ffd600; --dark: #1a1a2e; --text: #2d2d2d; --border: #e0ddd8;
            --accent: #ff4757; --green: #00b894;
        }
        body { font-family: 'Nunito', sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle at 20% 20%, rgba(108,92,231,0.08) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(255,112,67,0.08) 0%, transparent 50%); pointer-events: none; }
        .wrapper { display: flex; background: var(--card); border-radius: 28px; box-shadow: 0 30px 80px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05); overflow: hidden; width: 860px; min-height: 540px; }
        .characters-panel { width: 360px; background: linear-gradient(145deg, #f8f5f0 0%, #ede8e0 100%); display: flex; align-items: flex-end; justify-content: center; padding: 20px 20px 0; position: relative; overflow: hidden; }
        .characters-panel::after { content: 'BeenaPort'; position: absolute; top: 24px; left: 50%; transform: translateX(-50%); font-family: 'Space Mono', monospace; font-weight: 700; font-size: 18px; color: var(--dark); }
        .stage { display: flex; align-items: flex-end; gap: 12px; padding-bottom: 10px; }
        .char { position: relative; transform: translateY(-300px); opacity: 0; }
        .char.dropped { animation: dropIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
        .char.squish-anim { animation: squish 0.4s ease forwards; }
        .char.shaking { animation: shake 0.6s ease; }
        .char.happy { animation: bounce 0.8s ease; }
        @keyframes dropIn { 0% { transform: translateY(-300px); opacity: 0; } 60% { transform: translateY(10px); opacity: 1; } 80% { transform: translateY(-6px); } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes squish { 0% { transform: scaleX(1) scaleY(1); } 30% { transform: scaleX(1.3) scaleY(0.7); } 60% { transform: scaleX(0.9) scaleY(1.1); } 100% { transform: scaleX(1) scaleY(1); } }
        @keyframes shake { 0%,100% { transform: translateX(0); } 15% { transform: translateX(-8px) rotate(-3deg); } 30% { transform: translateX(8px) rotate(3deg); } 45% { transform: translateX(-6px) rotate(-2deg); } 60% { transform: translateX(6px) rotate(2deg); } 75% { transform: translateX(-4px); } 90% { transform: translateX(4px); } }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 25% { transform: translateY(-20px); } 50% { transform: translateY(-10px); } 75% { transform: translateY(-16px); } }
        .char-body { border-radius: 12px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 10px; transition: transform 0.3s ease; }
        #char1 .char-body { width: 80px; height: 80px; background: var(--purple); border-radius: 16px; }
        #char2 .char-body { width: 72px; height: 72px; background: var(--dark); border-radius: 16px; }
        #char3 .char-body { width: 90px; height: 55px; background: var(--orange); border-radius: 50px 50px 0 0; }
        #char4 .char-body { width: 68px; height: 68px; background: var(--yellow); border-radius: 50%; }
        .brows { display: flex; gap: 16px; margin-bottom: 2px; }
        .brow { width: 10px; height: 3px; background: white; border-radius: 2px; transition: transform 0.3s ease; }
        #char2 .brow, #char4 .brow { background: rgba(0,0,0,0.7); }
        .eyes { display: flex; gap: 12px; }
        .eye { width: 14px; height: 14px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #char2 .eye, #char4 .eye { background: rgba(255,255,255,0.9); }
        .pupil { width: 7px; height: 7px; background: #1a1a2e; border-radius: 50%; transition: transform 0.1s ease; }
        #char4 .pupil { background: #2d2d2d; }
        .mouth { width: 16px; height: 7px; border: 2.5px solid white; border-top: none; border-radius: 0 0 10px 10px; transition: all 0.3s ease; }
        #char2 .mouth, #char4 .mouth { border-color: rgba(0,0,0,0.6); }
        .mouth.sad { border-top: 2.5px solid; border-bottom: none; border-radius: 10px 10px 0 0; margin-top: 4px; }
        .form-panel { flex: 1; padding: 36px 44px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .plus-icon { position: absolute; top: 20px; right: 60px; font-size: 20px; color: var(--purple); opacity: 0.4; }
        .heart-icon { position: absolute; top: 20px; right: 28px; font-size: 16px; }
        .form-title { font-size: 28px; font-weight: 900; color: var(--dark); margin-bottom: 4px; }
        .form-subtitle { font-size: 14px; color: #888; margin-bottom: 20px; }
        .field { margin-bottom: 12px; }
        .field label { display: block; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
        .field input { width: 100%; padding: 11px 14px; border: 2px solid var(--border); border-radius: 12px; font-size: 14px; font-family: 'Nunito', sans-serif; outline: none; transition: border-color 0.2s, box-shadow 0.2s; background: #fafafa; }
        .field input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(108,92,231,0.12); background: white; }
        .field input.error { border-color: var(--accent); }
        .name-row { display: flex; gap: 10px; }
        .name-row .field { flex: 1; }
        .role-select { width: 100%; padding: 11px 14px; border: 2px solid var(--border); border-radius: 12px; font-size: 14px; font-family: 'Nunito', sans-serif; outline: none; background: #fafafa; cursor: pointer; transition: border-color 0.2s; appearance: none; }
        .role-select:focus { border-color: var(--purple); }
        .password-wrap { position: relative; }
        .password-wrap input { padding-right: 44px; }
        .eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 16px; }
        .error-msg { font-size: 12px; color: var(--accent); margin-top: 4px; display: none; }
        .error-msg.show { display: block; }
        .btn-submit { width: 100%; padding: 13px; background: var(--purple); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s, background 0.2s; margin-top: 16px; margin-bottom: 14px; }
        .btn-submit:hover { background: var(--dark); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(108,92,231,0.3); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .signup-text { font-size: 13px; color: #888; text-align: center; }
        .signup-text a { color: var(--purple); font-weight: 700; text-decoration: none; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--dark); color: white; padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 700; box-shadow: 0 8px 32px rgba(0,0,0,0.2); transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: var(--green); }
        .toast.error { background: var(--accent); }
        .confetti-piece { position: fixed; width: 10px; height: 10px; border-radius: 2px; animation: confettiFall linear forwards; pointer-events: none; z-index: 999; }
        @keyframes confettiFall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="characters-panel">
        <div class="stage">
            <div class="char" id="char1"><div class="char-body"><div class="brows"><div class="brow left"></div><div class="brow right"></div></div><div class="eyes"><div class="eye"><div class="pupil"></div></div><div class="eye"><div class="pupil"></div></div></div><div class="mouth"></div></div></div>
            <div class="char" id="char3" style="margin-bottom:-5px"><div class="char-body"><div class="brows"><div class="brow left"></div><div class="brow right"></div></div><div class="eyes"><div class="eye"><div class="pupil"></div></div><div class="eye"><div class="pupil"></div></div></div><div class="mouth"></div></div></div>
            <div class="char" id="char2"><div class="char-body"><div class="brows"><div class="brow left"></div><div class="brow right"></div></div><div class="eyes"><div class="eye"><div class="pupil"></div></div><div class="eye"><div class="pupil"></div></div></div><div class="mouth"></div></div></div>
            <div class="char" id="char4"><div class="char-body"><div class="brows"><div class="brow left"></div><div class="brow right"></div></div><div class="eyes"><div class="eye"><div class="pupil"></div></div><div class="eye"><div class="pupil"></div></div></div><div class="mouth"></div></div></div>
        </div>
    </div>
    <div class="form-panel">
        <span class="plus-icon">✛</span>
        <span class="heart-icon">🏠</span>
        <h1 class="form-title">Hesab yaradın!</h1>
        <p class="form-subtitle">BeenaPort-a qoşulun</p>
        <div class="name-row">
            <div class="field"><label>Ad</label><input type="text" id="firstNameInput" placeholder="Balash"></div>
            <div class="field"><label>Soyad</label><input type="text" id="lastNameInput" placeholder="Huseynov"></div>
        </div>
        <div class="field">
            <label>Rol</label>
            <select class="role-select" id="roleSelect">
                <option value="OWNER">Sahibkar (Owner)</option>
                <option value="TENANT">Kirayəçi (Tenant)</option>
                <option value="MANAGER">Menecer (Manager)</option>
                <option value="COMMERCIAL_OWNER">Kommersiya Sahibi</option>
            </select>
        </div>
        <div class="field">
            <label>Email</label>
            <input type="email" id="emailInput" placeholder="example@email.com" autocomplete="off">
            <div class="error-msg" id="emailError">Düzgün email daxil edin</div>
        </div>
        <div class="field">
            <label>Şifrə</label>
            <div class="password-wrap">
                <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="off">
                <button class="eye-btn" id="eyeBtn">👁️</button>
            </div>
            <div class="error-msg" id="passwordError">Şifrə ən az 6 simvol olmalıdır</div>
        </div>
        <button class="btn-submit" id="submitBtn" onclick="handleRegister()">Qeydiyyatdan keç</button>
        <p class="signup-text">Hesabınız var? <a href="/login">Daxil ol</a></p>
    </div>
</div>
<div class="toast" id="toast"></div>
<script>
    const API_BASE = '/api/v1/auth';
    let passwordVisible = false;

    async function handleRegister() {
        const firstName = document.getElementById('firstNameInput').value.trim();
        const lastName = document.getElementById('lastNameInput').value.trim();
        const email = document.getElementById('emailInput').value.trim();
        const password = document.getElementById('passwordInput').value;
        const role = document.getElementById('roleSelect').value;
        let valid = true;

        if (!firstName || !lastName) { shakeChars(); showToast('Ad və soyad daxil edin', 'error'); return; }
        if (!email || !/\S+@\S+\.\S+/.test(email)) {
            document.getElementById('emailInput').classList.add('error');
            document.getElementById('emailError').classList.add('show');
            valid = false;
        } else {
            document.getElementById('emailInput').classList.remove('error');
            document.getElementById('emailError').classList.remove('show');
        }
        if (!password || password.length < 6) {
            document.getElementById('passwordInput').classList.add('error');
            document.getElementById('passwordError').classList.add('show');
            valid = false;
        } else {
            document.getElementById('passwordInput').classList.remove('error');
            document.getElementById('passwordError').classList.remove('show');
        }
        if (!valid) { shakeChars(); return; }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Qeydiyyat olunur...';

        try {
            const response = await fetch(`${API_BASE}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ firstName, lastName, email, password, roles: [role] })
            });
            const data = await response.json();
            if (response.ok) {
                localStorage.setItem('accessToken', data.accessToken);
                localStorage.setItem('refreshToken', data.refreshToken);
                happyChars();
                showToast('🎉 Qeydiyyat uğurlu!', 'success');
                setTimeout(() => { window.location.href = '/dashboard'; }, 1500);
            } else {
                shakeChars();
                showToast(data.message || 'Xəta baş verdi', 'error');
                btn.disabled = false;
                btn.textContent = 'Qeydiyyatdan keç';
            }
        } catch (err) {
            shakeChars();
            showToast('Server ilə əlaqə yoxdur', 'error');
            btn.disabled = false;
            btn.textContent = 'Qeydiyyatdan keç';
        }
    }

    function showToast(msg, type = '') {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = 'toast show ' + type;
        setTimeout(() => { toast.className = 'toast'; }, 3000);
    }

    const chars = document.querySelectorAll('.char');
    const delays = [0, 120, 220, 340];
    chars.forEach((ch, i) => {
        setTimeout(() => {
            ch.classList.add('dropped');
            setTimeout(() => { ch.classList.add('squish-anim'); setTimeout(() => ch.classList.remove('squish-anim'), 400); }, 550);
        }, delays[i] + 200);
    });

    document.addEventListener('mousemove', e => {
        chars.forEach(char => {
            const pupils = char.querySelectorAll('.pupil');
            char.querySelectorAll('.eye').forEach((eye, i) => {
                const rect = eye.getBoundingClientRect();
                const dx = e.clientX - (rect.left + rect.width/2);
                const dy = e.clientY - (rect.top + rect.height/2);
                const dist = Math.sqrt(dx*dx + dy*dy);
                const px = dist > 0 ? (dx/dist) * Math.min(3, dist*0.1) : 0;
                const py = dist > 0 ? (dy/dist) * Math.min(3, dist*0.1) : 0;
                if (pupils[i]) pupils[i].style.transform = `translate(${px}px, ${py}px)`;
            });
        });
    });

    document.addEventListener('mousemove', e => {
        if (passwordVisible) return;
        const ratio = (e.clientX - window.innerWidth/2) / (window.innerWidth/2);
        chars.forEach(ch => {
            if (!ch.classList.contains('shaking') && !ch.classList.contains('happy')) {
                const body = ch.querySelector('.char-body');
                if (body) body.style.transform = `rotate(${ratio * 8}deg)`;
            }
        });
    });

    document.getElementById('eyeBtn').addEventListener('click', () => {
        passwordVisible = !passwordVisible;
        const input = document.getElementById('passwordInput');
        const btn = document.getElementById('eyeBtn');
        input.type = passwordVisible ? 'text' : 'password';
        btn.textContent = passwordVisible ? '🙈' : '👁️';
        chars.forEach(ch => {
            const body = ch.querySelector('.char-body');
            if (body) { body.style.transition = 'transform 0.4s ease'; body.style.transform = passwordVisible ? 'rotate(-25deg)' : 'rotate(0deg)'; }
        });
    });

    function shakeChars() {
        chars.forEach(ch => {
            ch.classList.remove('shaking'); void ch.offsetWidth; ch.classList.add('shaking');
            const mouth = ch.querySelector('.mouth');
            const browL = ch.querySelector('.brow.left');
            const browR = ch.querySelector('.brow.right');
            if (mouth) mouth.classList.add('sad');
            if (browL) browL.style.transform = 'rotate(15deg)';
            if (browR) browR.style.transform = 'rotate(-15deg)';
            setTimeout(() => {
                ch.classList.remove('shaking');
                if (mouth) mouth.classList.remove('sad');
                if (browL) browL.style.transform = '';
                if (browR) browR.style.transform = '';
            }, 700);
        });
    }

    function happyChars() {
        chars.forEach(ch => {
            ch.classList.remove('happy'); void ch.offsetWidth; ch.classList.add('happy');
            const mouth = ch.querySelector('.mouth');
            const browL = ch.querySelector('.brow.left');
            const browR = ch.querySelector('.brow.right');
            if (mouth) mouth.style.width = '20px';
            if (browL) browL.style.transform = 'rotate(-10deg)';
            if (browR) browR.style.transform = 'rotate(10deg)';
            setTimeout(() => {
                ch.classList.remove('happy');
                if (mouth) mouth.style.width = '';
                if (browL) browL.style.transform = '';
                if (browR) browR.style.transform = '';
            }, 800);
        });
        launchConfetti();
    }

    function launchConfetti() {
        const colors = ['#6c5ce7','#ff7043','#ffd600','#00b894','#ff4757'];
        for (let i = 0; i < 40; i++) {
            const el = document.createElement('div');
            el.className = 'confetti-piece';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.background = colors[Math.floor(Math.random() * colors.length)];
            el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
            el.style.animationDelay = Math.random() * 0.5 + 's';
            el.style.width = el.style.height = (6 + Math.random() * 8) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleRegister(); });
</script>
</body>
</html>
