version: '3.8'

services:

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - auth-service
#      - property-service
#      - billing-service
#      - payment-service

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://auth-db:5432/authdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=12345
    depends_on:
      - auth-db

  property-service:
    build: ./property-service
    container_name: property-service
    ports:
      - "8082:8082"

  billing-service:
    build: ./billing-service
    container_name: billing-service
    ports:
      - "8083:8083"

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8084:8084"

  auth-db:
    image: postgres:15
    container_name: auth-db
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5433:5432"