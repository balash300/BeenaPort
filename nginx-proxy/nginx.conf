events {
    worker_connections 1024;
}

http {
    server {
        listen 8080;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location /api/v1/auth/ {
            proxy_pass https://auth-service-beenaport-1234.fly.dev;
            proxy_set_header Host auth-service-beenaport-1234.fly.dev;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/property/ {
            proxy_pass https://property-service-beenaport-1234.fly.dev;
            proxy_set_header Host property-service-beenaport-1234.fly.dev;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/billing/ {
            proxy_pass https://billing-service-beenaport-1234.fly.dev;
            proxy_set_header Host billing-service-beenaport-1234.fly.dev;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/payment/ {
            proxy_pass https://payment-service-beenaport-1234.fly.dev;
            proxy_set_header Host payment-service-beenaport-1234.fly.dev;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}